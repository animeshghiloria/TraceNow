worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 20M;   # allow large image uploads

    # ─── Upstream services ──────────────────────
    upstream backend {
        server backend:3000;
    }

    upstream ai_service {
        server ai-service:8000;
    }

    # ─── Server block ────────────────────────────
    server {
        listen 80;
        server_name _;

        # ── REST API + WebSockets → NestJS ────────
        location /api/ {
            proxy_pass         http://backend/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;  # long timeout for WebSocket
        }

        # ── Socket.IO handshake ───────────────────
        location /socket.io/ {
            proxy_pass         http://backend/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 86400s;
        }

        # ── AI Microservice ───────────────────────
        location /ai/ {
            proxy_pass         http://ai_service/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;    # model inference can be slow
        }

        # ── Health check ──────────────────────────
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}
