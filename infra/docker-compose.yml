version: "3.9"

services:
  # ─────────────────────────────────────────────
  # PostgreSQL + PostGIS
  # ─────────────────────────────────────────────
  postgres:
    image: postgis/postgis:15-3.3
    container_name: tracenow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tracenow}
      POSTGRES_USER: ${POSTGRES_USER:-tracenow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tracenow_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tracenow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tracenow-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # AI Microservice (FastAPI + DeepFace + FAISS)
  # ─────────────────────────────────────────────
  ai-service:
    build:
      context: ../apps/ai-service
      dockerfile: Dockerfile
    container_name: tracenow-ai
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-tracenow}:${POSTGRES_PASSWORD:-tracenow_secret}@postgres:5432/${POSTGRES_DB:-tracenow}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      FAISS_INDEX_PATH: /app/data/faiss.index
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.75}
    volumes:
      - faiss_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
    ports:
      - "8000:8000"

  # ─────────────────────────────────────────────
  # Backend (NestJS)
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    container_name: tracenow-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-tracenow}:${POSTGRES_PASSWORD:-tracenow_secret}@postgres:5432/${POSTGRES_DB:-tracenow}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      AI_SERVICE_URL: http://ai-service:8000
      FIREBASE_SERVICE_ACCOUNT: ${FIREBASE_SERVICE_ACCOUNT}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      ALERT_RADIUS_KM: ${ALERT_RADIUS_KM:-5}
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────────
  # Nginx (Reverse Proxy)
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: tracenow-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - ai-service

volumes:
  postgres_data:
  redis_data:
  faiss_data:
